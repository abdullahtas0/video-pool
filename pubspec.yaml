name: video_pool
description: Enterprise video orchestration for Flutter - intelligent controller pooling with instance reuse, visibility-based lifecycle, thermal throttling, disk caching, and ready-to-use widgets.
version: 0.1.0
homepage: https://github.com/example/video_pool

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

flutter:
  plugin:
    platforms:
      android:
        package: com.videopool
        pluginClass: VideoPoolPlugin
      ios:
        pluginClass: VideoPoolPlugin

dependencies:
  flutter:
    sdk: flutter
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_video: ^1.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
