name: Close stale issues and PRs

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "confirmed,help wanted,pinned"
          exempt-pr-labels: "pinned"
          stale-issue-message: >
            This issue has been inactive for 60 days and is now marked as stale.
            If it's still relevant, please leave a comment — otherwise it will be
            closed in 14 days.
          stale-pr-message: >
            This pull request has been inactive for 60 days and is now marked as
            stale. Please update it, or it will be closed in 14 days.
          close-issue-message: >
            Closing this issue as it has been stale for 14 days with no activity.
            Feel free to reopen if it's still relevant.
          close-pr-message: >
            Closing this pull request as it has been stale for 14 days with no
            activity. Feel free to reopen when you're ready to continue.
