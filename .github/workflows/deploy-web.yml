name: Deploy web demo

# Builds the example app for the web and publishes it to GitHub Pages so the
# package has a live, in-browser demo. One-time setup: in the repository
# Settings -> Pages, set "Source" to "GitHub Actions".

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build example for web
        working-directory: example
        run: |
          flutter create --platforms=web .
          flutter pub get
          flutter build web --release --base-href /video-pool/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: example/build/web

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
